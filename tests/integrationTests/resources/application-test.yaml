spring:
  datasource:
    url: jdbc:tc:postgresql:17-alpine:///
    username: sa
    password: sa
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    hikari:
      maximum-pool-size: 2
  liquibase:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: ${spring.liquibase.default-schema}

application:
  config:
    rest:
      clients:
        balance:
          host: http://localhost:${wiremock.server.port}
        card:
          host: http://localhost:${wiremock.server.port}
    service:
      operation-lock:
        cache:
          striped-lock-size: 32

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: false
        slidingWindowSize: 100
        minimumNumberOfCalls: 100
        failureRateThreshold: 100
  retry:
    configs:
      default:
        maxAttempts: 1
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 100
        maxWaitDuration: 0ms
