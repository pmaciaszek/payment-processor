spring:
  datasource:
    url: jdbc:tc:postgresql:17-alpine:///
    username: sa
    password: sa
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    hikari:
      maximum-pool-size: 2
  liquibase:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: ${spring.liquibase.default-schema}

application:
  config:
    rest:
      clients:
        balance:
          host: http://localhost:${wiremock.server.port}
        card:
          host: http://localhost:${wiremock.server.port}
    service:
      operation-lock:
        cache:
          striped-lock-size: 32
